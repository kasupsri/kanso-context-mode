name: Benchmark

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  benchmark:
    name: Run Compression Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run benchmarks
        run: npm run test:benchmarks

      - name: Generate BENCHMARK.md
        run: npm run benchmark

      - name: Commit updated BENCHMARK.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update benchmark results [skip ci]'
          file_pattern: BENCHMARK.md
